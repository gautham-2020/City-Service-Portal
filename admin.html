<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Base Reset & Typography */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Vibrant Animated Gradient Background */
            background: linear-gradient(135deg, #1e003b, #4a00e0, #8e2de2);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: #ffffff;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Top Navigation/Header area */
        .header-container {
            width: 90%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header-container h1 {
            font-weight: 700;
            font-size: 2.2rem;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
        }

        .btn-logout {
            background: rgba(255, 65, 108, 0.8);
            border: 1px solid rgba(255, 65, 108, 1);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4);
            text-decoration: none;
        }

        .btn-logout:hover {
            background: rgba(255, 65, 108, 1);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 65, 108, 0.6);
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 1200px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            overflow-x: auto;
        }

        /* Modern Table Styling */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            text-align: left;
        }

        thead th {
            padding: 15px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7);
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        tbody tr {
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        tbody tr td:first-child {
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
        }

        tbody tr td:last-child {
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.01);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        td {
            padding: 15px;
            font-size: 0.95rem;
            vertical-align: middle;
        }

        /* Status Badges within Selects */
        select.status-select {
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 12px;
            border-radius: 8px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
        }

        select.status-select:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        select.status-select option {
            background: #2a0845;
            color: white;
        }

        /* Action Buttons */
        .btn-action {
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(58, 123, 213, 0.4);
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(58, 123, 213, 0.6);
            background: linear-gradient(90deg, #3a7bd5 0%, #00d2ff 100%);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
        }

        /* --- RESPONSIVENESS --- */
        @media (max-width: 768px) {
            body {
                padding: 20px 10px;
            }

            .header-container {
                flex-direction: column;
                gap: 20px;
                text-align: center;
                margin-bottom: 25px;
            }

            .header-container h1 {
                font-size: 1.75rem;
            }

            .glass-panel {
                padding: 15px;
                width: 100%;
                border-radius: 15px;
            }

            thead th,
            td {
                padding: 10px;
                font-size: 0.85rem;
            }

            .btn-logout {
                padding: 8px 20px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .header-container h1 {
                font-size: 1.5rem;
            }

            .btn-action {
                padding: 6px 12px;
                font-size: 0.8rem;
            }

            select.status-select {
                padding: 6px 8px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>

    <div class="header-container">
        <h1>Admin Dashboard</h1>
        <a href="index.html" class="btn-logout" id="logoutBtn">Back to Home</a>
    </div>

    <div class="glass-panel">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Location</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="complaintTable">
                <!-- Data populated by JS -->
            </tbody>
        </table>
    </div>

    <script type="module" src="admin.js"></script>

</body>

</html>
